name: lexis
description: "Wordle-inspired word puzzle game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.4
  google_fonts: ^6.2.1
  intl: ^0.19.0
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0
  package_info_plus: ^10.2.0
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/words/
    - assets/g-logo.png
    - assets/icon.png
