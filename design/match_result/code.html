<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Match Result - Victory</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec5b",
              "background-light": "#f6f8f6",
              "background-dark": "#102216",
              "surface-dark": "#162e1e",
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem", 
              "lg": "0.5rem", 
              "xl": "0.75rem", 
              "2xl": "1rem",
              "full": "9999px"
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-5px)' },
                }
            },
            animation: {
                float: 'float 3s ease-in-out infinite',
            }
          },
        },
      }
    </script>
<style>
        /* Custom utilities if needed */
        .text-glow {
            text-shadow: 0 0 20px rgba(19, 236, 91, 0.4);
        }
        .box-glow {
            box-shadow: 0 0 15px rgba(19, 236, 91, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-background-dark">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Ambient Background Effects -->
<div class="absolute top-[-15%] left-[-15%] w-[60%] h-[40%] bg-primary/20 rounded-full blur-[100px] pointer-events-none opacity-60"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[70%] h-[50%] bg-primary/10 rounded-full blur-[120px] pointer-events-none opacity-50"></div>
<!-- Top App Bar -->
<header class="flex items-center justify-between px-6 py-6 z-10 w-full">
<button class="group flex items-center justify-center size-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-white group-hover:-translate-x-0.5 transition-transform duration-200">arrow_back</span>
</button>
<h2 class="text-base font-semibold tracking-wider text-slate-500 dark:text-slate-400 uppercase">Match Result</h2>
<div class="size-10"></div> <!-- Spacer for optical centering -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 relative z-10 w-full gap-8">
<!-- Victory Header -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="relative">
<h1 class="text-[4rem] leading-[0.9] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-slate-800 to-slate-600 dark:from-white dark:to-primary text-glow select-none">
                        VICTORY
                    </h1>
<!-- Decorative sparkle icon -->
<span class="material-symbols-outlined absolute -top-4 -right-6 text-primary animate-float text-4xl fill-1">star</span>
</div>
<!-- Rating Badge -->
<div class="mt-2 inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary/10 dark:bg-primary/20 border border-primary/20 backdrop-blur-md shadow-lg shadow-primary/5">
<span class="material-symbols-outlined text-primary text-[20px] font-bold">trending_up</span>
<span class="text-primary font-bold text-lg tracking-tight">+24 Rating</span>
</div>
</div>
<!-- Puzzle Result Card -->
<div class="w-full flex flex-col items-center gap-6 py-8">
<!-- Word Tiles -->
<div class="flex gap-2 sm:gap-3 justify-center w-full perspective-[1000px]">
<!-- Letters -->
<div class="group relative flex items-center justify-center w-12 h-14 sm:w-14 sm:h-16 rounded-xl bg-primary text-background-dark shadow-[0_4px_0_rgb(11,168,61)] active:translate-y-[4px] active:shadow-none transition-all duration-200 cursor-default animate-[float_3s_ease-in-out_infinite_0ms]">
<span class="text-3xl font-bold">L</span>
</div>
<div class="group relative flex items-center justify-center w-12 h-14 sm:w-14 sm:h-16 rounded-xl bg-primary text-background-dark shadow-[0_4px_0_rgb(11,168,61)] transition-all duration-200 cursor-default animate-[float_3s_ease-in-out_infinite_100ms]">
<span class="text-3xl font-bold">I</span>
</div>
<div class="group relative flex items-center justify-center w-12 h-14 sm:w-14 sm:h-16 rounded-xl bg-primary text-background-dark shadow-[0_4px_0_rgb(11,168,61)] transition-all duration-200 cursor-default animate-[float_3s_ease-in-out_infinite_200ms]">
<span class="text-3xl font-bold">G</span>
</div>
<div class="group relative flex items-center justify-center w-12 h-14 sm:w-14 sm:h-16 rounded-xl bg-primary text-background-dark shadow-[0_4px_0_rgb(11,168,61)] transition-all duration-200 cursor-default animate-[float_3s_ease-in-out_infinite_300ms]">
<span class="text-3xl font-bold">H</span>
</div>
<div class="group relative flex items-center justify-center w-12 h-14 sm:w-14 sm:h-16 rounded-xl bg-primary text-background-dark shadow-[0_4px_0_rgb(11,168,61)] transition-all duration-200 cursor-default animate-[float_3s_ease-in-out_infinite_400ms]">
<span class="text-3xl font-bold">T</span>
</div>
</div>
<!-- Time Stats -->
<div class="flex items-center justify-center gap-2 px-4 py-1.5 rounded-lg bg-slate-200/50 dark:bg-white/5 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span class="text-sm font-medium tracking-widest font-mono">00:42</span>
</div>
</div>
<!-- Decorative Divider -->
<div class="w-16 h-1 rounded-full bg-slate-200 dark:bg-white/10"></div>
</main>
<!-- Bottom Action Area -->
<footer class="p-6 pb-10 w-full z-20 flex flex-col gap-4 bg-gradient-to-t from-background-light via-background-light/90 to-transparent dark:from-background-dark dark:via-background-dark/90 dark:to-transparent pt-12">
<!-- Play Again (Primary) -->
<button class="w-full relative group overflow-hidden bg-primary hover:bg-[#20ff6b] active:scale-[0.98] transition-all duration-200 text-background-dark font-bold text-lg h-16 rounded-2xl flex items-center justify-center gap-3 box-glow">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
<span class="material-symbols-outlined text-2xl">replay</span>
<span>Play Again</span>
</button>
<!-- Home (Secondary) -->
<button class="w-full bg-transparent border-2 border-slate-200 dark:border-surface-dark hover:border-slate-300 dark:hover:border-white/20 text-slate-700 dark:text-slate-300 font-semibold text-lg h-16 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-200">
<span class="material-symbols-outlined text-2xl opacity-70">home</span>
<span>Home</span>
</button>
</footer>
</div>
<!-- Shimmer Animation Config -->
<script>
      tailwind.config.theme.extend.keyframes.shimmer = {
        '100%': { transform: 'translateX(100%)' },
      }
    </script>
</body></html>
